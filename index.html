<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Platform Release Notes — DoorLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #162050;
      --blue: #3185fc;
      --green: #dffe02;
      --pink: #ff4998;
      --light-blue: #dbeaff;
      --cloud: #f0efeb;
      --white: #ffffff;
      --body: #475569;
      --muted: #64748b;
      --faint: #94a3b8;
      --border: #e8f0fe;
      --bg: #f8fafc;
      --shadow: 0 2px 16px rgba(22, 32, 80, 0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--body);
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      height: 52px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .nav-brand {
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--navy);
    }

    .nav-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--green);
      color: var(--navy);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .nav-badge .dot {
      width: 6px;
      height: 6px;
      background: var(--navy);
      border-radius: 50%;
      opacity: .5;
    }

    /* ── Hero ── */
    .hero {
      background: linear-gradient(135deg, var(--blue) 0%, var(--navy) 100%);
      padding: 48px 32px 52px;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='600' height='200' viewBox='0 0 600 200' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M-50 160 Q100 60 250 120 Q400 180 550 40 Q650 -20 720 80' stroke='white' stroke-width='60' stroke-linecap='round' fill='none' opacity='0.06'/%3E%3Cpath d='M100 200 Q200 100 350 150 Q500 200 620 80' stroke='white' stroke-width='45' stroke-linecap='round' fill='none' opacity='0.04'/%3E%3C/svg%3E") no-repeat right center / cover;
      pointer-events: none;
    }

    .hero-inner {
      max-width: 860px;
      margin: 0 auto;
      position: relative;
    }

    .hero-eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      background: rgba(22, 32, 80, 0.5);
      color: white;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 5px 12px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .hero-eyebrow .dot {
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 48px);
      font-weight: 900;
      letter-spacing: -.03em;
      color: white;
      line-height: 1.1;
      margin-bottom: 12px;
    }

    .hero h1 .accent {
      color: var(--green);
    }

    .hero p {
      font-size: 15px;
      color: rgba(255,255,255,.72);
      line-height: 1.6;
      max-width: 480px;
    }

    /* ── Main ── */
    .main {
      max-width: 860px;
      margin: 0 auto;
      padding: 36px 24px 60px;
    }

    /* ── Section header ── */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--faint);
    }

    .report-count {
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      background: var(--cloud);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* ── Card ── */
    .card {
      background: var(--white);
      border-radius: 16px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    /* ── Table ── */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead tr {
      background: var(--cloud);
      border-bottom: 1px solid var(--border);
    }

    thead th {
      padding: 10px 20px;
      text-align: left;
      font-size: 11.5px;
      font-weight: 700;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--faint);
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .1s;
    }

    tbody tr:last-child { border-bottom: none; }

    tbody tr:hover { background: #f8faff; }

    td {
      padding: 14px 20px;
      font-size: 14px;
      vertical-align: middle;
    }

    .date-cell {
      font-weight: 600;
      color: var(--navy);
      white-space: nowrap;
    }

    .version-chip {
      display: inline-block;
      background: var(--light-blue);
      color: var(--blue);
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      letter-spacing: .02em;
    }

    .version-chip.none {
      background: var(--cloud);
      color: var(--faint);
      font-family: inherit;
      font-weight: 500;
    }

    .title-cell {
      color: var(--body);
      max-width: 320px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .generated-cell {
      color: var(--faint);
      font-size: 13px;
      white-space: nowrap;
    }

    .view-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--navy);
      color: white;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: .02em;
      text-decoration: none;
      padding: 7px 14px;
      border-radius: 8px;
      white-space: nowrap;
      transition: background .15s, box-shadow .15s;
    }

    .view-btn:hover {
      background: #1e2f6e;
      box-shadow: 0 2px 8px rgba(22,32,80,.2);
    }

    .view-btn svg {
      width: 13px;
      height: 13px;
      flex-shrink: 0;
    }

    /* ── Empty state ── */
    .empty {
      padding: 60px 24px;
      text-align: center;
    }

    .empty-icon {
      width: 52px;
      height: 52px;
      background: var(--light-blue);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
    }

    .empty-icon svg {
      width: 26px;
      height: 26px;
      color: var(--blue);
    }

    .empty h3 {
      font-size: 16px;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 8px;
    }

    .empty p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.65;
      max-width: 360px;
      margin: 0 auto;
    }

    .empty code {
      background: var(--cloud);
      color: var(--navy);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    /* ── Error banner ── */
    .error-banner {
      background: #fff0f5;
      border-left: 3px solid var(--pink);
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 13px;
      font-weight: 500;
      color: #be185d;
      margin-bottom: 16px;
      display: none;
    }

    /* ── Drawer overlay ── */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(22, 32, 80, 0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity .25s ease;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: all;
    }

    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(860px, 100vw);
      background: var(--white);
      z-index: 101;
      display: flex;
      flex-direction: column;
      box-shadow: -8px 0 40px rgba(22, 32, 80, 0.18);
      transform: translateX(100%);
      transition: transform .3s cubic-bezier(.4, 0, .2, 1);
    }

    .drawer.open {
      transform: translateX(0);
    }

    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      height: 52px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--white);
    }

    .drawer-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: .01em;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-title .version-chip {
      font-size: 11px;
      padding: 2px 7px;
    }

    .drawer-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .drawer-open-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: var(--blue);
      text-decoration: none;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      transition: background .15s;
    }

    .drawer-open-btn:hover { background: var(--light-blue); }
    .drawer-open-btn svg { width: 12px; height: 12px; }

    .drawer-close {
      width: 32px;
      height: 32px;
      border: none;
      background: var(--cloud);
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--navy);
      transition: background .15s;
      flex-shrink: 0;
    }

    .drawer-close:hover { background: #e2ddd8; }
    .drawer-close svg { width: 16px; height: 16px; }

    .drawer-iframe {
      flex: 1;
      border: none;
      width: 100%;
      background: var(--bg);
    }
  </style>
</head>
<body>

<!-- Nav -->
<nav>
  <span class="nav-brand">DoorLoop — Platform Releases</span>
  <span class="nav-badge"><span class="dot"></span><span id="nav-count">Loading</span></span>
</nav>

<!-- Hero -->
<div class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow"><span class="dot"></span>Internal Tool</div>
    <h1>Platform Release <span class="accent">Notes</span></h1>
    <p>Help Center and Training Hub impact reports for every platform release — generated by Claude, stored here.</p>
  </div>
</div>

<!-- Drawer -->
<div class="drawer-backdrop" id="drawer-backdrop"></div>
<div class="drawer" id="drawer" role="dialog" aria-modal="true">
  <div class="drawer-header">
    <span class="drawer-title" id="drawer-title">Report</span>
    <div class="drawer-actions">
      <a class="drawer-open-btn" id="drawer-open-link" href="#" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Open in tab
      </a>
      <button class="drawer-close" id="drawer-close" aria-label="Close preview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
  </div>
  <iframe class="drawer-iframe" id="drawer-iframe" title="Report preview"></iframe>
</div>

<!-- Content -->
<div class="main">
  <div id="error-banner" class="error-banner"></div>

  <div class="section-header">
    <span class="section-title">All Reports</span>
    <span id="count-badge" class="report-count">— reports</span>
  </div>

  <div class="card">
    <div id="table-wrap"></div>
  </div>
</div>

<script>
  function formatDate(dateStr) {
    const [y, m, d] = dateStr.split('-').map(Number);
    return new Date(y, m - 1, d).toLocaleDateString('en-US', {
      weekday: 'short', month: 'short', day: 'numeric', year: 'numeric'
    });
  }

  function formatGenerated(iso) {
    if (!iso) return '';
    const d = new Date(iso);
    return isNaN(d) ? '' : d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function showError(msg) {
    const el = document.getElementById('error-banner');
    el.textContent = msg;
    el.style.display = 'block';
  }

  function renderEmpty() {
    return `
      <div class="empty">
        <div class="empty-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="3"/>
            <path d="M9 3v18M3 9h6M3 15h6"/>
          </svg>
        </div>
        <h3>No reports yet</h3>
        <p>Ask Claude to generate a release summary — for example:<br>
        <code>release summary for 2026-06-05</code></p>
      </div>`;
  }

  function renderTable(reports) {
    const sorted = [...reports].sort((a, b) => b.date.localeCompare(a.date));
    const rows = sorted.map(r => `
      <tr>
        <td class="date-cell">${formatDate(r.date)}</td>
        <td>${r.version
          ? `<span class="version-chip">${r.version}</span>`
          : `<span class="version-chip none">—</span>`}</td>
        <td class="title-cell" title="${r.title || ''}">${r.title || ''}</td>
        <td class="generated-cell">${formatGenerated(r.generatedAt)}</td>
        <td>
          <button class="view-btn" onclick="openDrawer('${r.filename}', '${r.version || ''}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
            View
          </button>
        </td>
      </tr>`).join('');

    return `
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Version</th>
            <th>Summary</th>
            <th>Generated</th>
            <th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  }

  async function init() {
    try {
      const res = await fetch('reports.json?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const reports = await res.json();

      const n = reports.length;
      document.getElementById('count-badge').textContent = `${n} report${n !== 1 ? 's' : ''}`;
      document.getElementById('nav-count').textContent = `${n} report${n !== 1 ? 's' : ''}`;
      document.getElementById('table-wrap').innerHTML = n === 0 ? renderEmpty() : renderTable(reports);
    } catch (err) {
      showError('Could not load reports.json — ' + err.message);
      document.getElementById('nav-count').textContent = 'Error';
      document.getElementById('table-wrap').innerHTML = renderEmpty();
    }
  }

  init();

  // ── Drawer ──
  const backdrop = document.getElementById('drawer-backdrop');
  const drawer   = document.getElementById('drawer');
  const iframe   = document.getElementById('drawer-iframe');
  const titleEl  = document.getElementById('drawer-title');
  const openLink = document.getElementById('drawer-open-link');

  function openDrawer(url, version) {
    iframe.src = url;
    openLink.href = url;
    titleEl.innerHTML = version
      ? `<span>Report</span><span class="version-chip">${version}</span>`
      : 'Report';
    backdrop.classList.add('open');
    drawer.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    backdrop.classList.remove('open');
    drawer.classList.remove('open');
    document.body.style.overflow = '';
    // clear iframe after transition so it doesn't linger
    setTimeout(() => { iframe.src = ''; }, 300);
  }

  document.getElementById('drawer-close').addEventListener('click', closeDrawer);
  backdrop.addEventListener('click', closeDrawer);
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });
</script>
</body>
</html>
